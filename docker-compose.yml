services:
  postgres:
    image: postgres:16-alpine
    container_name: denimisia_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: denimisia
      POSTGRES_USER: denimisia
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-test:
    image: postgres:16-alpine
    container_name: denimisia_postgres_test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: denimisia_test
      POSTGRES_USER: denimisia
      POSTGRES_PASSWORD: secret
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U denimisia -d denimisia_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    profiles:
      - test

  redis:
    image: redis:7-alpine
    container_name: denimisia_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
