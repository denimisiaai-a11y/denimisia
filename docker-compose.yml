services:
  postgres:
    image: postgres:16-alpine
    container_name: denimisia_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: denimisia
      POSTGRES_USER: denimisia
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: denimisia_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
