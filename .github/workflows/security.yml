name: Security
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'   # Mondays 3 AM UTC

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # TODO(sec): pin gitleaks/gitleaks-action to commit SHA — fetch with:
      #   gh api repos/gitleaks/gitleaks-action/git/refs/tags/v2 --jq .object.sha
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit production deps (high + critical only)
        run: pnpm audit --prod --audit-level=high || echo "::warning::pnpm audit found high/critical vulnerabilities"
