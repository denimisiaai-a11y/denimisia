name: API Docker

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'apps/api/**'
      - 'packages/database/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/api-docker.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # TODO(sec): pin docker/* actions to commit SHAs — fetch current SHAs with:
      #   gh api repos/docker/setup-buildx-action/git/refs/tags/v3 --jq .object.sha
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        # TODO(sec): pin docker/login-action to commit SHA — fetch with:
        #   gh api repos/docker/login-action/git/refs/tags/v3 --jq .object.sha
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: tags
        run: |
          REPO=ghcr.io/${{ github.repository_owner }}/denimisia-api
          TAG_LIST="${REPO}:sha-${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAG_LIST="${TAG_LIST},${REPO}:${VERSION},${REPO}:latest"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAG_LIST="${TAG_LIST},${REPO}:main"
          fi
          echo "tags=${TAG_LIST}" >> $GITHUB_OUTPUT

      - name: Build & push
        # TODO(sec): pin docker/build-push-action to commit SHA — fetch with:
        #   gh api repos/docker/build-push-action/git/refs/tags/v5 --jq .object.sha
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
